<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swimmer Visualizer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <header class="app-header">
      <h1>Swimmer Visualizer</h1>
      <p>Simple race phase view with playback</p>
    </header>

    <section class="panel">
      <form id="sim-form" class="sim-form">
        <label>
          Unit
          <select id="unit">
            <option value="yards" selected>Yards</option>
            <option value="meters">Meters</option>
          </select>
        </label>

        <label>
          Pool Length
          <select id="pool-length"></select>
        </label>

        <label>
          Race Distance
          <select id="lap-distance"></select>
        </label>

        <label>
          Stroke
          <select id="stroke">
            <option value="freestyle">Freestyle</option>
            <option value="backstroke">Backstroke</option>
            <option value="breaststroke">Breaststroke</option>
            <option value="butterfly">Butterfly</option>
            <option value="im">Individual Medley</option>
          </select>
        </label>

        <label>
          Gender
          <select id="gender">
            <option value="male">Male</option>
            <option value="female">Female</option>
          </select>
        </label>

        <label>
          Age Group
          <select id="age-group">
            <option value="open">Open / Senior</option>
            <option value="17-18">17-18</option>
            <option value="15-16">15-16</option>
            <option value="13-14">13-14</option>
            <option value="11-12" selected>11-12</option>
            <option value="10u">10 &amp; Under</option>
          </select>
        </label>

        <label>
          Preset
          <select id="time-preset">
            <option value="silver">Silver</option>
            <option value="gold" selected>Gold</option>
            <option value="wr">World Record</option>
            <option value="custom">Custom</option>
          </select>
        </label>

        <label>
          Ideal Time (s)
          <input id="ideal-time" type="number" min="10" max="3600" step="0.01" value="58.00">
        </label>

        <label>
          Your Time (s)
          <input id="actual-time" type="number" min="10" max="3600" step="0.01" value="62.00">
        </label>

        <button type="submit" class="primary">Simulate</button>
      </form>
    </section>

    <section class="panel controls">
      <button id="play-pause">Play</button>
      <button id="reset">Reset</button>

      <label class="speed-control">
        Speed
        <select id="speed">
          <option value="0.5">0.5x</option>
          <option value="1" selected>1x</option>
          <option value="2">2x</option>
          <option value="4">4x</option>
        </select>
      </label>

      <div id="time-readout">0.00s / 0.00s</div>
      <div id="warning" hidden>Target time was clamped to minimum reference.</div>
    </section>

    <section class="panel" id="summary-panel">
      <div id="summary" class="summary empty">Run a simulation to see race metrics.</div>
    </section>

    <section class="panel pool-panel">
      <h2>Pool View</h2>
      <div id="lanes" class="lanes">
        <div class="empty">Run a simulation to render pool lengths.</div>
      </div>
    </section>
  </main>

  <script src="../constants.js"></script>
  <script src="../phaseModel.js"></script>
  <script src="app.js"></script>
</body>
</html>
