<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swim Lap Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>&#x1f3ca; Swim Lap Simulator</h1>
  <p>Biomechanical lap phase breakdown &amp; animation</p>
</header>

<div class="container">

  <!-- ── Form ───────────────────────────────────────────────── -->
  <section class="form-panel">
    <form id="sim-form">
      <div class="form-row">
        <div class="form-group">
          <label for="unit">Units</label>
          <select id="unit">
            <option value="meters">Meters</option>
            <option value="yards" selected>Yards</option>
          </select>
        </div>
        <div class="form-group">
          <label for="pool-length">Pool Length</label>
          <select id="pool-length">
            <option value="25">25m (short course)</option>
            <option value="50">50m (long course)</option>
          </select>
        </div>
        <div class="form-group">
          <label for="lap-distance">Lap Distance</label>
          <select id="lap-distance"></select>
        </div>
        <div class="form-group">
          <label for="stroke">Stroke</label>
          <select id="stroke">
            <option value="freestyle">Freestyle</option>
            <option value="backstroke">Backstroke</option>
            <option value="breaststroke">Breaststroke</option>
            <option value="butterfly">Butterfly</option>
            <option value="im">Individual Medley (IM)</option>
          </select>
        </div>
        <div class="form-group">
          <label for="gender">Gender</label>
          <select id="gender">
            <option value="male">Male</option>
            <option value="female">Female</option>
          </select>
        </div>
        <div class="form-group">
          <label for="age-group">Age Group</label>
          <select id="age-group">
            <option value="open">Open / Senior</option>
            <option value="17-18">17-18</option>
            <option value="15-16">15-16</option>
            <option value="13-14">13-14</option>
            <option value="11-12" selected>11-12</option>
            <option value="10u">10 &amp; Under</option>
          </select>
        </div>
        <div class="form-group">
          <label for="time-preset">Level Preset</label>
          <select id="time-preset">
            <option value="silver">Silver (~FINA 600)</option>
            <option value="gold" selected>Gold (~FINA 800)</option>
            <option value="wr">World Record</option>
            <option value="custom">Custom</option>
          </select>
        </div>
        <div class="form-group">
          <label for="target-time">Target Time (seconds)</label>
          <input type="number" id="target-time" value="58.00"
                 min="10" max="3600" step="0.01" style="width:130px">
        </div>
        <button type="submit" class="simulate-btn">&#9654; Simulate</button>
      </div>
    </form>
  </section>

  <!-- ── Controls ───────────────────────────────────────────── -->
  <div class="controls-bar">
    <button class="ctrl-btn" id="play-pause-btn">&#9654; Play</button>
    <button class="ctrl-btn" id="reset-btn">&#10227; Reset</button>
    <div class="ctrl-sep"></div>
    <span class="speed-label">Speed:</span>
    <select id="speed-select">
      <option value="0.5">0.5x</option>
      <option value="1" selected>1x</option>
      <option value="2">2x</option>
      <option value="4">4x</option>
      <option value="8">8x</option>
    </select>
    <span id="time-warning">&#9888; Time clamped to minimum (world record floor)</span>
    <span id="sim-time-display">0.00s</span>
  </div>

  <!-- ── Lap timeline visualization ────────────────────────── -->
  <div id="timeline-container">
    <div class="section-title">&#x23f1; Lap Breakdown</div>
    <div id="lap-rows">
      <div class="placeholder">Configure inputs and click Simulate</div>
    </div>
    <div class="phase-legend" id="phase-legend"></div>
  </div>

</div><!-- /.container -->

<script src="constants.js"></script>
<script src="phaseModel.js"></script>
<script src="animator.js"></script>
<script src="ui.js"></script>
<script>
  window.addEventListener('DOMContentLoaded', () => {
    UI.init();
  });
</script>

</body>
</html>
